  <button id="copyBtn">📋 העתק פרומפט</button>
  <button id="exampleBtn">👁️ הצג דוח לדוגמה</button>

  <div id="status" role="status"></div>

  <div class="credit">פיתוח ועיצוב: ד״ר אסף אוזן</div>
</main>

<div id="overlay" aria-hidden="true">
  <div class="ov-bar">
    <b>📄 דוגמה: דוח ניהול סיכונים — "ישראל ריאלית" (חינוך STEM)</b>
    <button id="closeOv">✕ סגור</button>
  </div>
  <iframe id="frame" title="דוח לדוגמה"></iframe>
</div>

<script>
const copyBtn    = document.getElementById("copyBtn");
const statusEl   = document.getElementById("status");
const exampleBtn = document.getElementById("exampleBtn");
const overlay    = document.getElementById("overlay");
const frame      = document.getElementById("frame");
const closeOv    = document.getElementById("closeOv");

copyBtn.addEventListener("click", async () => {
  try{
    await navigator.clipboard.writeText(RISK_PROMPT);
  }catch(e){
    const ta=document.createElement("textarea");
    ta.value=RISK_PROMPT;document.body.appendChild(ta);ta.select();
    document.execCommand("copy");ta.remove();
  }
  copyBtn.classList.add("done");
  copyBtn.textContent="✅ הועתק!";
  statusEl.textContent="הפרומפט הועתק. הוסף מסמך תפיסה והדבק במודל שפה.";
  statusEl.className="ok";
  setTimeout(()=>{copyBtn.classList.remove("done");copyBtn.textContent="📋 העתק פרומפט";},2600);
});

exampleBtn.addEventListener("click",()=>{
  if(!frame.srcdoc)frame.srcdoc=SAMPLE_REPORT;
  overlay.classList.add("show");
  overlay.setAttribute("aria-hidden","false");
});
closeOv.addEventListener("click",()=>{
  overlay.classList.remove("show");
  overlay.setAttribute("aria-hidden","true");
});
overlay.addEventListener("click",e=>{if(e.target===overlay)closeOv.click();});

/* ---- הפרומפט הקבוע ---- */
const RISK_PROMPT = `אתה מומחה בכיר לניהול סיכונים, חדשנות ואסדרה במערכת החינוך הישראלית.

אצרף לך מסמך תפיסה של פרויקט / יוזמה חינוכית. נתח אותו וצור דוח ניהול סיכונים מקצועי ושלם.

🔴 פלט מבוקש: קובץ HTML יחיד, מלא ומעוצב (RTL, עברית) — ללא הסברים לפני או אחרי, ללא markdown, רק קוד HTML שניתן לשמור כקובץ ולפתוח בדפדפן.

═══════════════════════════
כללים מחייבים לניתוח
═══════════════════════════
1. התמקד בהיבטים פדגוגיים, ארגוניים ורגולטוריים בלבד. אל תכלול נתונים כלכליים/תקציביים מספריים.
2. זהה בדיוק 3 מטרות מרכזיות מתוך המסמך.
3. גזור 4–5 סיכונים ישירות מן המטרות. כל סיכון חייב לציין לאיזו מטרה הוא קשור.
4. לכל סיכון חשב: חומרה = הסתברות (1–10) × עוצמת נזק (1–10).
   רמות: גבוהה מאוד (81–100) · גבוהה (49–80) · בינונית (25–48) · נמוכה (1–24).
5. לכל סיכון פרט: השלכות (2–3) + הזדמנויות (1–2) + מקור רגולטורי רלוונטי (ציטוט).
6. בנה תוכנית התמודדות עם אסטרטגיות ויעדי הצלחה (KPI) ולוחות זמנים.
7. דרג רמת חדשנות (1–10) כממוצע של 4 רכיבים: השפעה פדגוגית, מורכבות טכנולוגית, שינוי ארגוני, סיכון טכנולוגי.
8. הוסף טבלת התאמה לדרישות אסדרה (סטטוס: תקין / חלקי / בפיתוח / טעון שיפור).
9. סיים בסיכום מנהלים + 3 המלצות קונקרטיות (מענה לכל אחת מ-3 המטרות).
10. הוסף סקציית "מקורות מידע" המפרטת את הבסיס הרגולטורי והאקדמי שעליו נשען הניתוח.

═══════════════════════════
מבנה ועיצוב ה-HTML (חובה — שמור על אחידות מלאה)
═══════════════════════════
- מסמך HTML יחיד עם <style> פנימי. RTL, dir="rtl", lang="he".
- כותרת עליונה כהה (gradient) עם שם הפרויקט, תת-כותרת ומטא (אחראי + תאריך).
- סרגל ניווט עליון "דביק" (sticky) עם קישורים לסקציות.
- סקציות לפי הסדר הבא, כל אחת עם כותרת צבעונית ממורכזת:
  s1 📋 הגדרת הפרויקט (כרטיסי מטא + מטרות + תוצרים)
  s2 ⚠️ ניהול סיכונים (סיכום מספרי 4 רמות + כרטיסי סיכון עם הסתברות/נזק/חומרה, השלכות, הזדמנויות)
  s3 📈 תוכנית התמודדות (אסטרטגיות + KPI + לוחות זמנים)
  s4 🚀 אסדרת חדשנות (המלצת ועדת משנה + ארגז חול רגולטורי)
  s5 📊 רמת החדשנות (ציון כולל גדול + 4 רכיבים)
  s6 ✅ התאמה לדרישות אסדרה (טבלה עם סטטוסים צבעוניים)
  s7 📝 סיכום מנהלים והמלצות
  s8 📚 מקורות מידע (רשימת מקורות רגולטוריים ואקדמיים)
- פלטת צבעים: כותרות כהות (#1a3a5c/#2c3e50), סיכונים באדום/כתום/צהוב/ירוק לפי חומרה, חדשנות בסגול (#8e44ad).
- כרטיסים מעוגלים עם צללית, רספונסיבי (grid), וכלל @media print להדפסה ל-PDF.
- הוסף בראש העמוד כפתורי "🎨 עריכה", "📄 PDF" ו-"💾 שמור" (position:fixed) הפועלים על תוכן בעל class="editable".

═══════════════════════════
כעת אצרף את מסמך התפיסה לניתוח:
═══════════════════════════
[הדבק כאן את מסמך התפיסה, או צרף אותו כקובץ]`;

<section id="s1"><div class="sec-hdr editable">📋 הגדרת הפרויקט</div><div class="proj-ov"><div class="grid"><div class="card"><h4>👤 <span class="editable">אחראי פרויקט</span></h4><p class="editable">מנהל תוכנית "ישראל ריאלית"</p></div><div class="card"><h4>🏢 <span class="editable">ארגון</span></h4><p class="editable">משרד החינוך</p></div><div class="card"><h4>🌍 <span class="editable">היקף</span></h4><p class="editable">לאומי - מגיל גן ועד התיכון</p></div><div class="card"><h4>📅 <span class="editable">לוח זמנים</span></h4><p class="editable">תשפ"ה-תש"צ (2025-2030)</p></div><div class="card"><h4>🚀 <span class="editable">סוג חדשנות</span></h4><p class="editable">חדשנות פדגוגית וארגונית (Disruptive)</p></div><div class="card"><h4>📋 <span class="editable">סטטוס רגולטורי</span></h4><p class="editable">טיוטה - דורש מנגנוני אסדרה גמישים</p></div></div></div><div class="list-sec"><h3 class="editable">🎯 מטרות הפרויקט</h3><div class="item editable"><strong>1. ניהול פעלני של השלומות האישית (Well-being)</strong><br>רכישת כשירויות לניהול פעלני של חיי הלומדים בכל ממדי החיים כאזרחים אורייני STEM.</div><div class="item editable"><strong>2. הגדלת המוביליות, הרלוונטיות והפריון</strong><br>שיפור מיומנויות של כלל העובדים במשק לצמצום פערים חברתיים וכלכליים.</div><div class="item editable"><strong>3. חיזוק תחומי ה-STEM ברמה הלאומית</strong><br>הכשרת מקצועני STEM להעצמת חוסנה הכלכלי, הביטחוני והמדעי של מדינת ישראל.</div></div><div class="list-sec"><h3 class="editable">📋 תוצרים מצופים</h3><div class="item editable"><strong>תוכניות לימודים מבוססות כשירויות</strong> — עדכון תוכניות למדעים, טכנולוגיה, הנדסה ומתמטיקה מותאמות PISA/TIMSS.</div><div class="item editable"><strong>מרחבי למידה חדשניים ומרכזי STEM</strong> — הקמת מעבדות Maker, שילוב AI ו-XR, ופיתוח מרכזים אזוריים.</div><div class="item editable"><strong>מתווה הערכה רב-ממדי</strong> — מעבר מהערכת ידע מסורתית לפורטפוליו, הערכת ביצועים ומבחני כשירויות.</div></div></section>
<section id="s2"><div class="sec-hdr editable">⚠️ ניהול סיכונים</div><div class="risks-wrap"><div class="risk-sum"><div class="sum-card"><div class="sum-num c-vh editable">2</div><div>גבוהה מאוד</div></div><div class="sum-card"><div class="sum-num c-h editable">1</div><div>גבוהה</div></div><div class="sum-card"><div class="sum-num c-m editable">1</div><div>בינונית</div></div><div class="sum-card"><div class="sum-num c-l editable">0</div><div>נמוכה</div></div></div><div class="risks-grid"><div class="risk-card risk-very-high"><div class="risk-head"><div class="risk-title editable">פערי הוגנות נגישות לטכנולוגיה (פגיעה במוביליות)</div><div class="sev severity-very-high editable">חמור מאוד</div></div><div style="font-size:.9em;color:#3498db;margin-bottom:10px" class="editable">מקושר למטרה 2: מוביליות ופריון</div><div class="metrics"><div class="metric"><div class="metric-val editable">8</div><div class="metric-lbl">הסתברות</div></div><div class="metric"><div class="metric-val editable">9</div><div class="metric-lbl">עוצמת נזק</div></div><div class="metric"><div class="metric-val editable">72</div><div class="metric-lbl">דרגת חומרה</div></div></div><div class="desc editable">סכנה שרשויות חזקות יישמו את התוכנית בקלות בעוד הפריפריה תיוותר מאחור בשל מחסור בתשתיות ובכוח אדם מיומן.</div><div class="impact-title">השלכות:</div><ul class="ulist imp"><li class="editable">העמקת הפערים הסוציואקונומיים.</li><li class="editable">פגיעה באמון הציבור בתוכנית.</li><li class="editable">חוסר יכולת למצות פוטנציאל אנושי בפריפריה.</li></ul><div class="opp-title">הזדמנויות:</div><ul class="ulist opp"><li class="editable">הקמת מרכזי STEM אזוריים כמשאב משותף ונגיש.</li><li class="editable">שימוש בלמידה וירטואלית מבוססת AI לסגירת פערים.</li></ul></div><div class="risk-card risk-very-high"><div class="risk-head"><div class="risk-title editable">התנגדות לשינוי ומחסור במורים מתאימים</div><div class="sev severity-very-high editable">חמור מאוד</div></div><div style="font-size:.9em;color:#3498db;margin-bottom:10px" class="editable">מקושר למטרה 3: חיזוק תחומי ה-STEM</div><div class="metrics"><div class="metric"><div class="metric-val editable">9</div><div class="metric-lbl">הסתברות</div></div><div class="metric"><div class="metric-val editable">8</div><div class="metric-lbl">עוצמת נזק</div></div><div class="metric"><div class="metric-val editable">72</div><div class="metric-lbl">דרגת חומרה</div></div></div><div class="desc editable">המעבר מ"הוראת ידע" ל"הנחיית כשירויות" והוראה בין-תחומית דורש שינוי תפיסתי עמוק והכשרה ארוכה, מול תחרות כוח אדם עם התעשייה.</div><div class="impact-title">השלכות:</div><ul class="ulist imp"><li class="editable">יישום חלקי או שטחי של התוכנית בכיתות.</li><li class="editable">שחיקה גבוהה של צוותי הוראה.</li></ul><div class="opp-title">הזדמנויות:</div><ul class="ulist opp"><li class="editable">פיתוח מודלים של הוראה שיתופית (Co-Teaching) וקהילות מורים.</li></ul></div><div class="risk-card risk-high"><div class="risk-head"><div class="risk-title editable">עומס קוגניטיבי וניתוק תלמידים</div><div class="sev severity-high editable">גבוה</div></div><div style="font-size:.9em;color:#3498db;margin-bottom:10px" class="editable">מקושר למטרה 1: שלומות אישית</div><div class="metrics"><div class="metric"><div class="metric-val editable">7</div><div class="metric-lbl">הסתברות</div></div><div class="metric"><div class="metric-val editable">8</div><div class="metric-lbl">עוצמת נזק</div></div><div class="metric"><div class="metric-val editable">56</div><div class="metric-lbl">דרגת חומרה</div></div></div><div class="desc editable">למידה פעלנית ובין-תחומית, ללא תיווך נכון ופרסונליזציה, עלולה לייצר תסכול ונשירה בקרב תלמידים חלשים יותר.</div><div class="impact-title">השלכות:</div><ul class="ulist imp"><li class="editable">ירידה במוטיבציה במקום העלאתה.</li><li class="editable">פגיעה בתחושת המסוגלות של התלמידים.</li></ul><div class="opp-title">הזדמנויות:</div><ul class="ulist opp"><li class="editable">שילוב מערכות למידה אדפטיביות וחונכי AI להתאמת הקצב.</li></ul></div><div class="risk-card risk-medium"><div class="risk-head"><div class="risk-title editable">אי-הלימה בין תוכנית הלימודים להערכה פורמלית</div><div class="sev severity-medium editable">בינוני</div></div><div style="font-size:.9em;color:#3498db;margin-bottom:10px" class="editable">כללי - השפעה על כל המטרות</div><div class="metrics"><div class="metric"><div class="metric-val editable">6</div><div class="metric-lbl">הסתברות</div></div><div class="metric"><div class="metric-val editable">7</div><div class="metric-lbl">עוצמת נזק</div></div><div class="metric"><div class="metric-val editable">42</div><div class="metric-lbl">דרגת חומרה</div></div></div><div class="desc editable">עיכוב באסדרת בחינות הבגרות ומבחני המיצ"ב כך שישקפו כשירויות ולא ידע בלבד.</div><div class="impact-title">השלכות:</div><ul class="ulist imp"><li class="editable">מורים יחזרו להוראה מסורתית כדי "ללמד למבחן".</li><li class="editable">תסכול בקרב תלמידים המוערכים בשיטות מיושנות.</li></ul><div class="opp-title">הזדמנויות:</div><ul class="ulist opp"><li class="editable">קידום רפורמה מקיפה בהערכה מבוססת פורטפוליו והגנה בעל פה.</li></ul></div></div></div></section>
<section id="s3"><div class="sec-hdr editable">📈 תוכנית התמודדות</div><div class="strats"><div class="strat"><div class="strat-hdr editable">פיתוח תשתיות הוגנות (מענה לסיכון 1)</div><div class="strat-body"><p class="editable" style="color:#34495e;margin-bottom:14px">הקמת מערך מרכזי STEM אזוריים ושילוב סביבות וירטואליות מתקדמות המנגישות את הלמידה.</p><div class="strat-grid"><div class="strat-item"><h5 class="editable">מודל תקצוב דיפרנציאלי</h5><p class="editable">תעדוף רשויות במדד טיפוח נמוך.</p><span class="badge-t">רבעון 3, 2025</span></div><div class="strat-item"><h5 class="editable">פריסת מרכזים</h5><p class="editable">תכנון והקמת 5 מרכזים אזוריים בפריפריה.</p><span class="badge-t">רבעון 1, 2026</span></div><div class="strat-item"><h5 class="editable">מדד הצלחה</h5><p class="editable">עלייה ב-30% בהשתתפות תלמידי פריפריה בפרויקטים.</p><span class="badge-k">KPI</span></div></div></div></div><div class="strat"><div class="strat-hdr editable">מעטפת הכשרה ואסדרה לצוותי הוראה (מענה לסיכון 2 ו-4)</div><div class="strat-body"><p class="editable" style="color:#34495e;margin-bottom:14px">יצירת קהילות מקצועיות (PLC) והגמשת הרגולציה הפדגוגית לטובת הוראה בין-תחומית וגמישות בשעות.</p><div class="strat-grid"><div class="strat-item"><h5 class="editable">קהילות למידה</h5><p class="editable">פתיחת הכשרות ייעודיות ל"מנחי כשירויות".</p><span class="badge-t">רבעון 4, 2025</span></div><div class="strat-item"><h5 class="editable">פיילוט בגרות פורטפוליו</h5><p class="editable">השקת פיילוט הערכה אינטגרטיבית לבתי ספר מובילים.</p><span class="badge-t">שנת הלימודים תשפ"ז</span></div><div class="strat-item"><h5 class="editable">מדד הצלחה</h5><p class="editable">80% ממורי ה-STEM יעברו הכשרת פדגוגיה חדשנית.</p><span class="badge-k">KPI</span></div></div></div></div></div></section>
<section id="s4"><div class="sec-hdr editable">🚀 אסדרת חדשנות</div><div class="innov-reg"><div class="white-box"><h3 style="color:#8e44ad;margin-bottom:12px" class="editable">פדגוגיה מוטת עתיד ומבוססת כשירויות</h3><p class="editable" style="color:#34495e;line-height:1.8">המעבר להוראה בין-תחומית, למידת Maker וסימולטורים, דורש מרחב רגולטורי מאפשר ללמידה במרחבי החיים (Out-of-school) ושילוב מנטורים חיצוניים.</p><p class="editable" style="color:#34495e;line-height:1.8;margin-top:10px">מחויבות לאחריות חברתית ואתית בשימוש בבינה מלאכותית, תוך קידום הוגנות ושקיפות בהערכה מותאמת אישית.</p></div><div class="comm-box"><h4>🏛️ המלצת ועדת המשנה לאסדרת חדשנות</h4><p class="editable" style="color:#34495e;line-height:1.8">לאשר "ארגז חול רגולטורי" למוסדות מקדמי STEM להפעלת מערכות שעות גמישות ומתן קרדיטציה ללמידה בלתי פורמלית.</p></div></div></section>
<section id="s5"><div class="sec-hdr editable">📊 רמת החדשנות</div><div class="innov-level"><h2 class="editable" style="font-size:1.4em;margin-bottom:4px">ציון חדשנות כולל</h2><div class="innov-score editable">8.3</div><div class="innov-lbl editable">/ 10 — מהפכנית פדגוגית</div><p class="editable" style="opacity:.85;max-width:600px;margin:0 auto 16px">שינוי פרדיגמטי מהעברת ידע לבניית כשירויות אינטגרטיביות, מבוסס טכנולוגיה וגמישות מערכתית.</p><div class="comp-grid"><div class="comp"><div class="comp-score editable">9.5</div><div class="comp-title editable">השפעה פדגוגית</div><p class="editable" style="opacity:.85;font-size:.9em">שינוי מהותי מהוראת דיסציפלינות מבודדות לגישה בין-תחומית והוליסטית (CBL/PBL).</p></div><div class="comp"><div class="comp-score editable">8.0</div><div class="comp-title editable">מורכבות טכנולוגית</div><p class="editable" style="opacity:.85;font-size:.9em">אימוץ AI כחונך, כלי XR/VR, ומעבדות דיגיטליות מתקדמות.</p></div><div class="comp"><div class="comp-score editable">9.0</div><div class="comp-title editable">שינוי ארגוני</div><p class="editable" style="opacity:.85;font-size:.9em">דרישה למערכת שעות מודולרית, תפקידים חדשים, ומרחבי למידה גמישים.</p></div><div class="comp"><div class="comp-score editable">6.5</div><div class="comp-title editable">סיכון טכנולוגי</div><p class="editable" style="opacity:.85;font-size:.9em">תלות בתשתיות אינטרנט וענן בטוחות ואמינות, בדגש על AI.</p></div></div></div></section>
<section id="s6"><div class="sec-hdr editable">✅ התאמה לדרישות אסדרה</div><div class="reg-wrap"><table class="reg-table"><thead><tr><th>דרישת אסדרה</th><th>סטטוס</th><th>פעולה נדרשת</th></tr></thead><tbody><tr><td class="editable"><strong>הכרה בלמידה אי-פורמלית</strong><br><small>קרדיטציה אקדמית/בית-ספרית לתוצרי מועדונים ותנועות.</small></td><td><span class="badge-improve">טעון שיפור</span></td><td class="editable">פיתוח מתווה "דרכון STEM" לתגים דיגיטליים אחידים.</td></tr><tr><td class="editable"><strong>הגמשת מערכת השעות</strong><br><small>מעבר לבלוקים של 90+ דקות ועבודה בינתחומית.</small></td><td><span class="badge-dev">בפיתוח</span></td><td class="editable">עדכון חוזר מנכ"ל לארגון שעות הלמידה.</td></tr><tr><td class="editable"><strong>הערכה ובגרויות חלופיות</strong><br><small>שילוב פורטפוליו דיגיטלי והגנה בע"פ כתחליף ציון.</small></td><td><span class="badge-partial">חלקי</span></td><td class="editable">פיילוט בגרות אינטגרטיבית באישור המזכירות הפדגוגית.</td></tr><tr><td class="editable"><strong>שילוב AI בהוראה ובהערכה</strong><br><small>רגולציה מותאמת לגיל (בדגש על גיל רך) ופרטיות נתונים.</small></td><td><span class="badge-full">תקין (עם בקרה)</span></td><td class="editable">החלת מסמך "בינה מלאכותית בגני הילדים" על שכבות נוספות.</td></tr></tbody></table></div></section>
<section id="s7"><div class="sec-hdr editable">📝 סיכום מנהלים והמלצות</div><div class="exec"><h2 style="text-align:center;color:#f39c12;margin-bottom:18px" class="editable">סיכום ביצועי</h2><div class="exec-grid"><div class="exec-card"><h4>📊 רמת חדשנות</h4><p class="editable">שינוי פרדיגמה יסודי (Disruptive) מהוראה להנחיה.</p></div><div class="exec-card"><h4>🔐 הסיכון הגדול</h4><p class="editable">פערים בתשתיות והכשרת מורים שיובילו לאי-שוויון.</p></div><div class="exec-card"><h4>⚠️ רמת סיכון כוללת</h4><p class="editable">גבוהה (נדרשת היערכות מערכתית רוחבית).</p></div></div><div class="recs"><h3>💡 המלצות מרכזיות</h3><div class="rec editable"><strong>1. מיסוד הגמישות הארגונית</strong><br>להקים מנגנון אסדרה התומך בחדשנות פדגוגית ללמידה רציפה (24/7).</div><div class="rec editable"><strong>2. תעדוף הוגנות ופריפריה</strong><br>תקצוב מהיר של מרכזי STEM אזוריים כמשאב שוויוני מבוסס AI וטכנולוגיות ייצור.</div><div class="rec editable"><strong>3. מודל הערכה עדכני</strong><br>האצת סנכרון הבגרויות ומבחני המפמ"ר למסגרות PISA/TIMSS להערכת כשירויות הוליסטית.</div></div><p class="editable" style="text-align:center;margin-top:20px;opacity:.75;font-size:.9em">יש לאשר את תוכניות הפיתוח המקצועי לקראת שנת תשפ"ו.</p></div></section>
<section id="s8"><div class="sec-hdr editable" style="background:linear-gradient(135deg,#1a3a5c,#2c3e50)">📚 מקורות מידע</div><div class="src-wrap"><div class="src-grid"><div class="src-card"><h4>📐 מסגרות רגולטוריות</h4><ul><li class="editable">חוזר מנכ"ל משרד החינוך לאסדרת חדשנות</li><li class="editable">חוק לימוד חובה, התש"ט–1949</li><li class="editable">חוזר מנכ"ל לארגון שעות הלמידה ומבנה יום הלימודים</li><li class="editable">מסמך "בינה מלאכותית בגני הילדים" — המזכירות הפדגוגית</li></ul></div><div class="src-card"><h4>🎓 בסיס פדגוגי ואקדמי</h4><ul><li class="editable">עקרונות RRI (מחקר וחדשנות אחראיים)</li><li class="editable">פדגוגיה מוטת עתיד — אגף מו"פ, ניסויים ויוזמות</li><li class="editable">מודלים פדגוגיים: CBL / PBL (למידה מבוססת כשירויות ופרויקטים)</li><li class="editable">תפיסת השלומות (Well-being) בחינוך</li></ul></div><div class="src-card"><h4>🌍 מדדים ומבחנים בינלאומיים</h4><ul><li class="editable">PISA — תכנית הערכת תלמידים בינלאומית (OECD)</li><li class="editable">TIMSS — מגמות בהישגים במתמטיקה ומדעים</li><li class="editable">מסגרת מיומנויות המאה ה-21 (OECD Learning Compass 2030)</li></ul></div><div class="src-card"><h4>📄 מסמכי מקור של הפרויקט</h4><ul><li class="editable">מסמך תפיסה — מינהל חדשנות וטכנולוגיה (גרסה 1.3), מאי 2026</li><li class="editable">המלצת ועדת המשנה לאסדרת חדשנות</li><li class="editable">תוכנית "ישראל ריאלית" — מסמך יסוד</li></ul></div></div><div class="src-note editable">הערה מתודולוגית: הסיכונים, ציוני החומרה וההמלצות בדוח זה נגזרו מניתוח מסמך התפיסה אל מול המקורות שלעיל. ציון החומרה לכל סיכון = הסתברות (1–10) × עוצמת נזק (1–10). יש לעדכן את המקורות בהתאם למסמך התפיסה הספציפי המנותח.</div></div></section>
