<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EZRA · פרומפט לניהול סיכונים</title>
<style>
:root{
  --bg:#eef2fb;--card:#fff;--ink:#1f2937;--muted:#667085;--line:#e4e7ec;
  --brand:#2b7cd3;--brand-dark:#1f63ad;--ink-badge:#1a2f4a;--ok:#1f9d6b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;background:var(--bg);
  color:var(--ink);font-family:"Segoe UI",Tahoma,Arial,sans-serif;padding:20px}
main{width:min(560px,100%);background:var(--card);border:1px solid var(--line);
  border-radius:20px;padding:30px 32px;box-shadow:0 12px 40px rgba(31,41,55,.07)}
.badge{float:left;background:var(--ink-badge);color:#fff;font-weight:800;
  font-size:.8rem;letter-spacing:.4px;padding:6px 14px;border-radius:999px}
h1{font-size:1.7rem;color:var(--ink-badge);margin-bottom:18px}
.steps{list-style:none;margin:0 0 22px;padding:0;display:flex;flex-direction:column;gap:10px}
.steps li{display:flex;align-items:flex-start;gap:11px;font-size:1rem;color:var(--ink);line-height:1.5}
.steps .n{flex:none;width:26px;height:26px;border-radius:50%;background:var(--brand);
  color:#fff;font-weight:800;display:grid;place-items:center;font-size:.85rem}
button{width:100%;border:0;cursor:pointer;font-family:inherit;border-radius:12px;
  padding:15px 16px;font-weight:800;font-size:1.05rem;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:background .2s,transform .1s,border-color .2s,color .2s}
button:active{transform:scale(.99)}
#copyBtn{background:var(--brand);color:#fff}
#copyBtn:hover{background:var(--brand-dark)}
#copyBtn.done{background:var(--ok)}
#exampleBtn{background:#fff;color:var(--ink);border:1px solid var(--line);margin-top:11px}
#exampleBtn:hover{border-color:var(--brand);color:var(--brand-dark)}
#status{min-height:1.4em;margin-top:16px;font-weight:700;font-size:.92rem;color:var(--muted);text-align:center}
#status.ok{color:var(--ok)}
.credit{margin-top:22px;padding-top:16px;border-top:1px solid var(--line);
  text-align:center;color:var(--muted);font-size:.85rem;font-weight:600}
button:focus-visible{outline:3px solid #f0b429;outline-offset:2px}

#overlay{position:fixed;inset:0;background:rgba(15,23,42,.7);display:none;z-index:1000;padding:18px}
#overlay.show{display:flex;flex-direction:column}
.ov-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;color:#fff;padding:6px 4px 12px;flex-wrap:wrap}
.ov-bar b{font-size:.95rem}
.ov-bar button{width:auto;background:#fff;color:var(--ink);padding:8px 16px;border-radius:999px}
#frame{flex:1;width:100%;border:0;border-radius:14px;background:#fff}
</style>
</head>
<body>

<main>
  <span class="badge">EZRA&nbsp;5.0</span>
  <h1>פרומפט לניהול סיכונים</h1>

  <ol class="steps">
    <li><span class="n">1</span><span>העתק את הפרומפט.</span></li>
    <li><span class="n">2</span><span>הוסף מסמך תפיסה והדבק במודל שפה.</span></li>
    <li><span class="n">3</span><span>קבל דוח סופי לניהול סיכונים.</span></li>
  </ol>

  <button id="copyBtn">📋 העתק פרומפט</button>
  <button id="exampleBtn">👁️ הצג דוח לדוגמה</button>

  <div id="status" role="status"></div>
  <div class="credit">פיתוח ועיצוב: ד״ר אסף אוזן</div>
</main>

<div id="overlay" aria-hidden="true">
  <div class="ov-bar">
    <b>📄 דוח לדוגמה — להמחשה בלבד</b>
    <button id="closeOv">✕ סגור</button>
  </div>
  <iframe id="frame" title="דוח לדוגמה" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-scripts allow-modals allow-top-navigation-by-user-activation" referrerpolicy="no-referrer"></iframe>
</div>

<script>
const copyBtn=document.getElementById("copyBtn");
const statusEl=document.getElementById("status");
const exampleBtn=document.getElementById("exampleBtn");
const overlay=document.getElementById("overlay");
const frame=document.getElementById("frame");
const closeOv=document.getElementById("closeOv");

copyBtn.addEventListener("click",async()=>{
  try{await navigator.clipboard.writeText(PROMPT);}
  catch(e){const ta=document.createElement("textarea");ta.value=PROMPT;
    document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();}
  copyBtn.classList.add("done");copyBtn.textContent="✅ הועתק!";
  statusEl.textContent="הפרומפט הועתק. הוסף מסמך תפיסה והדבק במודל שפה.";statusEl.className="ok";
  setTimeout(()=>{copyBtn.classList.remove("done");copyBtn.textContent="📋 העתק פרומפט";},2600);
});

exampleBtn.addEventListener("click",()=>{
  if(!frame.srcdoc)frame.srcdoc=SAMPLE_REPORT;
  overlay.classList.add("show");overlay.setAttribute("aria-hidden","false");
});
closeOv.addEventListener("click",()=>{overlay.classList.remove("show");overlay.setAttribute("aria-hidden","true");});
overlay.addEventListener("click",e=>{if(e.target===overlay)closeOv.click();});

/* ══ הפרומפט (עובד, מחזיר JSON — לא לשנות) ══ */
const PROMPT = `אתה מומחה בכיר לניהול סיכונים, חדשנות ואסדרה במערכת החינוך הישראלית.

המשימה: קרא את מסמך התפיסה שבסוף ההודעה, ונתח אותו לכדי דוח ניהול סיכונים.

🔴 הפלט חייב להיות JSON תקני בלבד — ללא טקסט לפני, ללא טקסט אחרי, ללא \`\`\`json, ללא markdown, ללא הסברים. רק אובייקט JSON אחד תקני שאפשר להעביר ישירות ל-JSON.parse.

═══════════════════════════
כללי ניתוח מחייבים (לשמירה על אחידות מלאה בין כל המודלים)
═══════════════════════════
1. התמקד בהיבטים פדגוגיים, ארגוניים ורגולטוריים בלבד. אל תכלול נתונים כלכליים/תקציביים מספריים (סכומים, עלויות, תקציב).
2. זהה בדיוק 3 מטרות מרכזיות מהמסמך. שדה title של כל מטרה יכיל את שם המטרה בלבד — בלי המילה "מטרה" ובלי מספר (המספור מתווסף אוטומטית בעיצוב). לדוגמה: "פיתוח כשירויות STEM" ולא "מטרה 1: פיתוח כשירויות STEM".
3. גזור בדיוק 5 סיכונים, ישירות מהמטרות. כל סיכון יציין בתיאורו לאיזו מטרה הוא קשור, בפורמט: "(נגזר ממטרה N: <שם>)".
4. חישוב חומרה לכל סיכון — חובה: score = probability × damage, כאשר probability ו-damage שלמים בין 1 ל-10.
   קביעת severity ו-severity_label לפי score:
     score 81–100  → severity="very-high", severity_label="חומרה גבוהה מאוד"
     score 49–80   → severity="high",       severity_label="חומרה גבוהה"
     score 25–48   → severity="medium",      severity_label="חומרה בינונית"
     score 1–24    → severity="low",         severity_label="חומרה נמוכה"
   ערכי severity המותרים: "very-high" | "high" | "medium" | "low" — ואין אחרים.
5. כל סיכון מבוסס על שני עוגנים יחד: (א) מטרה — יצוין בתיאור בפורמט "(נגזר ממטרה: <שם המטרה>)"; (ב) מקור — שדה source יכיל ציטוט מקור רגולטורי רלוונטי מתוך רשימת המקורות שבסוף הפרומפט. כל סיכון כולל גם impacts (2–3 פריטים) ו-opportunities (1–2 פריטים).
6. strategies: 2–3 אסטרטגיות התמודדות. כל אסטרטגיה כוללת items; כל item עם badge ו-badge_type. badge_type המותרים: "timeline" (לוח זמנים) או "kpi" (מדד הצלחה). חובה שכל אסטרטגיה תכלול לפחות item אחד עם badge_type="kpi" ו-title="מדד הצלחה".
7. innovation: score הוא הממוצע (מעוגל לעשירית) של 4 ה-components. components חייבים להיות בדיוק 4, בסדר ובכותרות הבאות: "השפעה פדגוגית", "מורכבות טכנולוגית", "שינוי ארגוני", "סיכון טכנולוגי". כל component עם score שלם 1–10 ותיאור.
8. regulation_table: 4–5 שורות. ערכי status המותרים: "full" | "partial" | "dev" | "improve" בלבד. status_label בהתאם: full="תקין" / partial="חלקי" / dev="בפיתוח" / improve="טעון שיפור".
9. executive_summary.recommendations: בדיוק 3 המלצות קונקרטיות — אחת לכל מטרה. שדה title יכיל את שם ההמלצה בלבד, בלי המילה "המלצה" ובלי מספר (המספור מתווסף אוטומטית). אפשר לציין את שיוך המטרה בסוגריים בסוף, למשל: "סטנדרט פדגוגי מחייב (למטרה: כשירויות STEM)".
10. אל תמציא מקורות, קישורים או URLs. שדה source הוא ציטוט טקסטואלי בלבד. (הקישורים החיים מתווספים אוטומטית על ידי המערכת.)
11. כל הערכים טקסטואליים בעברית. אל תשאיר שדות ריקים — מלא כל שדה בתוכן ענייני הנגזר מהמסמך.

הערות מילוי:
- meta.overview_cards: השאר את ה-icon וה-title כפי שהם; מלא רק את content.
- score בכל סיכון = probability × damage (ודא התאמה מספרית).
- innovation.score = ממוצע 4 הרכיבים (עיגול לעשירית).
- אם פרט מסוים אינו מופיע במסמך — הסק אותו באופן סביר מהקשר החינוכי, אך אל תמציא נתונים כמותיים.

═══════════════════════════
שלב הפקה — חובה (גם וגם):
═══════════════════════════
לאחר שתסיים את הניתוח, אל תסתפק בהצגת ה-JSON בצ'אט. צור עבורי בפועל קובץ HTML יחיד, מלא ומעוצב בעברית (RTL), הכולל:
- CSS פנימי, עיצוב כרטיסים, כותרת עליונה, וסרגל ניווט לסקציות.
- כל הסקציות לפי ה-JSON: הגדרת פרויקט, סיכונים (עם הסתברות/נזק/חומרה צבעוניים), תוכנית התמודדות, אסדרת חדשנות, רמת חדשנות, טבלת רגולציה, סיכום מנהלים, ומקורות מידע.
- כפתורי "עריכה" / "PDF" / "שמור" בראש העמוד.
- במספור המטרות/ההמלצות: הצג את המספר כעיגול עיצובי בלבד, ואל תכפיל אותו בתוך הטקסט.
הפק את הקובץ כקובץ להורדה/פתיחה בדפדפן — לא כקטע קוד בלבד.
